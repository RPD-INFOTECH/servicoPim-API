name: Build and Push Docker Image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: cp .env.test .env

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration:docker

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    env:
      PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
      PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
      PORTAINER_STACK_NAME: ${{ secrets.PORTAINER_STACK_NAME }}
      PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Redeploy stack no Portainer
        if: env.PORTAINER_WEBHOOK_URL != '' || env.PORTAINER_TOKEN != ''
        run: |
          if [ -n "${PORTAINER_WEBHOOK_URL}" ]; then
            echo "Tentando redeploy via webhook do Portainer..."
            if curl -fsS -X POST "${PORTAINER_WEBHOOK_URL}"; then
              exit 0
            fi
            echo "Webhook falhou; tentando fallback via API token."
          fi

          if [ -z "${PORTAINER_TOKEN}" ]; then
            echo "PORTAINER_TOKEN não configurado; não foi possível executar fallback."
            exit 1
          fi

          PORTAINER_BASE_URL="${PORTAINER_URL:-http://45.84.243.199:9000}"
          STACK_ID="${PORTAINER_STACK_ID:-}"
          STACK_NAME="${PORTAINER_STACK_NAME:-gestao-os}"
          ENDPOINT_ID="${PORTAINER_ENDPOINT_ID:-}"

          if [ -z "${STACK_ID}" ] || [ -z "${ENDPOINT_ID}" ]; then
            echo "Buscando stack '${STACK_NAME}' na API do Portainer..."
            STACKS_JSON="$(curl -fsS "${PORTAINER_BASE_URL}/api/stacks" -H "X-API-Key: ${PORTAINER_TOKEN}")"
            STACK_ID="$(STACKS_JSON="${STACKS_JSON}" STACK_NAME="${STACK_NAME}" node -e "const stacks = JSON.parse(process.env.STACKS_JSON || '[]'); const stack = stacks.find((item) => item.Name === process.env.STACK_NAME); if (stack) process.stdout.write(String(stack.Id));")"
            ENDPOINT_ID="$(STACKS_JSON="${STACKS_JSON}" STACK_NAME="${STACK_NAME}" node -e "const stacks = JSON.parse(process.env.STACKS_JSON || '[]'); const stack = stacks.find((item) => item.Name === process.env.STACK_NAME); if (stack) process.stdout.write(String(stack.EndpointId || stack.EndpointID || ''));")"

            if [ -z "${STACK_ID}" ] || [ -z "${ENDPOINT_ID}" ]; then
              echo "Stack '${STACK_NAME}' não encontrada no Portainer."
              echo "Configure PORTAINER_STACK_NAME com o nome exato da stack ou PORTAINER_STACK_ID e PORTAINER_ENDPOINT_ID."
              exit 1
            fi
          fi

          echo "Tentando redeploy via API do Portainer no stack ${STACK_ID}, endpoint ${ENDPOINT_ID}..."
          curl -fsS -X PUT "${PORTAINER_BASE_URL}/api/stacks/${STACK_ID}/git/redeploy?endpointId=${ENDPOINT_ID}" \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"pullImage": true, "repositoryAuthentication": false}'
