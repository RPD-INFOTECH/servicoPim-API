name: Build and Push Docker Image

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Setup test environment
        run: cp .env.test .env

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration:docker

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Atualiza tag da API no docker-compose.yml do frontend
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/RPD-INFOTECH/gestao-os-pim.git frontend-repo
          cd frontend-repo
          sed -i "s|image: ghcr.io/rpd-infotech/servicopim-api:.*|image: ghcr.io/rpd-infotech/servicopim-api:${SHA}|" docker-compose.yml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docker-compose.yml
          git diff --staged --quiet || git commit -m "ci: atualiza imagem API para ${SHA}"
          git push

      - name: Redeploy stack no Portainer
        run: curl -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
